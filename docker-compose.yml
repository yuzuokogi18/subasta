version: "3.9"

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: auction_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      live_auction
      MYSQL_USER:          auction_user
      MYSQL_PASSWORD:      auction_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql          # persistencia de datos
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql  # script inicial
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "auction_user", "-pauction_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - auction_network

  # ── Backend Node.js ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: auction_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy      # espera a que MySQL esté listo
    environment:
      # MySQL
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_USER:     auction_user
      DB_PASSWORD: auction_pass
      DB_NAME:     live_auction
      # Cloudinary (reemplaza con tus credenciales reales)
      CLOUDINARY_CLOUD_NAME:   ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:      ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:   ${CLOUDINARY_API_SECRET}
      # Puertos
      WS_PORT:   8080
      HTTP_PORT: 3000
    ports:
      - "8080:8080"   # WebSocket
      - "3000:3000"   # HTTP API
    networks:
      - auction_network

  # ── Adminer (opcional: cliente web para ver la BD) ─────────────────────────
  adminer:
    image: adminer:latest
    container_name: auction_adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8081:8080"
    networks:
      - auction_network

# ── Volúmenes y redes ──────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

networks:
  auction_network:
    driver: bridge
